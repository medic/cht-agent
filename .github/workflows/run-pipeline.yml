name: Run memory pipeline

on:
  schedule:
    # Daily at 06:00 UTC — processes PRs merged in the last 24h
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Specific cht-core PR number to process (leave empty for recent PRs)'
        required: false
        type: string
      lookback_hours:
        description: 'Hours to look back for merged PRs when no PR number given'
        required: false
        default: '24'
        type: string

jobs:
  run-pipeline:
    name: Scrape, filter, and distill cht-core PRs
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRIAGE_MODEL: ${{ vars.TRIAGE_MODEL }}
          DISTILL_MODEL: ${{ vars.DISTILL_MODEL }}
          PR_NUMBER: ${{ inputs.pr_number }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            npm run run-pipeline -- --pr "$PR_NUMBER"
          else
            npm run run-pipeline -- --since "$LOOKBACK_HOURS"
          fi

      - name: Commit knowledge drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent-memory/_pending/ agent-memory/_skipped.ndjson
          git diff --cached --quiet || git commit -m "chore: add knowledge drafts [skip ci]"
          git push
